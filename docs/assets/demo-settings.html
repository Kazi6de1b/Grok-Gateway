<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Grok Gateway — Settings</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { width: 1180px; min-height: 760px; overflow: hidden; }
    .app-shell { min-height: 760px; }
    body { filter: brightness(1.08) contrast(1.04) saturate(1.06); }
    .ambient { opacity: .16 !important; }
    .settings-layout { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
    .view, .view.active {
      display: block !important;
      opacity: 1 !important;
      transform: none !important;
    }
    .pulse-dot { animation: none !important; }
  </style>
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">G</div>
        <div><strong>Grok Gateway</strong><span>本地控制台</span></div>
      </div>
      <nav>
        <button class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 13h6V4H4v9zm10 7h6V11h-6v9zM14 4v5h6V4h-6zM4 20h6v-5H4v5z"/></svg></span>概览</button>
        <button class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c.6-3 2.8-4.8 5.5-4.8S14 16 14.6 19"/></svg></span>账号池</button>
        <button class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16V10"/><path d="M12 16V7"/><path d="M16 16v-4"/></svg></span>统计</button>
        <button class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 4h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg></span>日志</button>
        <button class="nav-item active"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/></svg></span>配置</button>
      </nav>
      <div class="side-status">
        <div class="pulse-dot"></div>
        <div><strong>网关在线</strong><span>v0.4.1 · 127.0.0.1</span></div>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">网关配置</p>
          <h1>配置</h1>
        </div>
        <div class="top-actions">
          <button class="btn btn-ghost">刷新用量</button>
          <button class="btn btn-primary">启动 Grok Build</button>
        </div>
      </header>
      <section class="view active">
        <form class="settings-layout">
          <section class="card settings-card">
            <div class="settings-heading">
              <div class="setting-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3 4.5 7.5v9L12 21l7.5-4.5v-9L12 3z"/></svg></div>
              <div><h3>本地网关</h3><p>Grok Build 连接的本机入口地址。</p></div>
            </div>
            <label>监听地址<input value="127.0.0.1:8787" readonly><small>仅允许 127.0.0.1 或 localhost</small></label>
            <label>Grok Build 上游<input value="https://cli-chat-proxy.grok.com/v1" readonly></label>
          </section>
          <section class="card settings-card">
            <div class="settings-heading">
              <div class="setting-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 7h10v4H7z"/><path d="M7 13h10v4H7z"/></svg></div>
              <div><h3>网络代理</h3><p>OAuth、用量与推理请求的统一出站通道。</p></div>
            </div>
            <label>出站代理<input value="http://127.0.0.1:7890" readonly><small>兼容 Clash / Mihomo mixed-port</small></label>
            <label>账号冷却时间<input value="5m" readonly><small>上游未返回 Retry-After 时使用</small></label>
          </section>
          <section class="card settings-card full">
            <div class="settings-heading">
              <div class="setting-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 12a4 4 0 1 1 0-.01"/><path d="M10.5 12H21"/></svg></div>
              <div><h3>网关 API Key</h3><p>可选。开启后访问 /v1/* 需携带网关密钥；管理界面不受影响。真实 xAI 鉴权仍由账号池完成。</p></div>
            </div>
            <div class="key-row">
              <div>
                <span class="key-status">已设置密钥 · 强制校验已开启</span>
                <label class="check-label"><input type="checkbox" checked disabled> 强制校验网关 API Key</label>
                <label class="check-label"><input type="checkbox" disabled> 在日志中记录请求体摘要（有隐私风险）</label>
              </div>
              <div class="toolbar-actions">
                <button class="btn btn-ghost" type="button">生成 / 轮换密钥</button>
                <button class="btn btn-danger" type="button">清除密钥</button>
              </div>
            </div>
          </section>
          <div class="settings-footer">
            <div><strong>配置保存在程序同目录</strong><span>修改网络相关项后需重启程序；API Key 开关写入后立即对 /v1 生效。</span></div>
            <button class="btn btn-primary" type="button">保存配置</button>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
