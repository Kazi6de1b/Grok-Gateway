<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1280px; height: 640px;
      background: radial-gradient(ellipse at 75% 20%, rgba(184,255,90,.14), transparent 42%),
                  radial-gradient(ellipse at 15% 85%, rgba(113,72,255,.18), transparent 40%),
                  linear-gradient(145deg, #07090e 0%, #0d1118 55%, #0a0c12 100%);
      color: #f5f7fb;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
      position: relative;
    }
    .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at 50% 40%, #000 20%, transparent 75%);
    }
    .wrap {
      position: relative; z-index: 1;
      height: 100%;
      padding: 72px 88px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .brand {
      display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
    }
    .mark {
      width: 56px; height: 56px; border-radius: 16px;
      display: grid; place-items: center;
      background: linear-gradient(145deg, #b8ff5a, #6ac921);
      color: #0b1105; font-weight: 900; font-size: 28px;
      box-shadow: 0 0 40px rgba(184,255,90,.28);
    }
    .brand span {
      font-size: 13px; letter-spacing: 3px; color: #8d94a5; font-weight: 700;
    }
    h1 {
      font-size: 64px; letter-spacing: -2.5px; line-height: 1.05;
      font-weight: 800; max-width: 820px; margin-bottom: 18px;
    }
    h1 em { font-style: normal; color: #b8ff5a; }
    p {
      max-width: 720px; color: #9aa3b5; font-size: 20px; line-height: 1.55;
      margin-bottom: 36px;
    }
    .chips { display: flex; gap: 12px; flex-wrap: wrap; }
    .chip {
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px; font-weight: 700; color: #d5dbe8;
    }
    .chip.lime {
      border-color: rgba(184,255,90,.28);
      background: rgba(184,255,90,.08);
      color: #c8f58a;
    }
    .orb {
      position: absolute; right: 110px; top: 50%; transform: translateY(-50%) rotate(45deg);
      width: 160px; height: 160px; border-radius: 42%;
      background: radial-gradient(circle at 35% 30%, #d9ffa9, #76d830 45%, #274a14 100%);
      box-shadow: 0 0 90px rgba(184,255,90,.22), inset -12px -15px 30px rgba(0,0,0,.25);
      display: grid; place-items: center;
    }
    .orb span { transform: rotate(-45deg); font-size: 58px; font-weight: 950; color: #122007; }
    .ring {
      position: absolute; right: 78px; top: 50%; transform: translateY(-50%);
      width: 250px; height: 250px; border-radius: 50%;
      border: 1px solid rgba(184,255,90,.18);
    }
    .ring:before {
      content: ""; position: absolute; width: 10px; height: 10px; border-radius: 50%;
      background: #b8ff5a; left: 36px; top: 28px; box-shadow: 0 0 16px #b8ff5a;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="ring"></div>
  <div class="orb"><span>G</span></div>
  <div class="wrap">
    <div class="brand">
      <div class="mark">G</div>
      <span>OPEN SOURCE · WINDOWS</span>
    </div>
    <h1>Grok Build 账号池<br><em>本地网关</em></h1>
    <p>多账号 OAuth、用量同步、会话粘滞与自动故障迁移 — 一键启动，仅监听本机。</p>
    <div class="chips">
      <div class="chip lime">WebView2 Desktop</div>
      <div class="chip">Device OAuth</div>
      <div class="chip">Auto Failover</div>
      <div class="chip">SSE Streaming</div>
    </div>
  </div>
</body>
</html>
